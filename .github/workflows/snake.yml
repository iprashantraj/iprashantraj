name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: iprashantraj
          outputs: |
            dist/snake.svg?color_snake=%23FF6B35&color_dots=%230B0B2E,%231B1464,%237B2FBE,%23FF6B35,%23FFB870
            dist/snake-dark.svg?palette=github-dark&color_snake=%23FF6B35&color_dots=%230B0B2E,%231B1464,%237B2FBE,%23FF6B35,%23FFB870

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
