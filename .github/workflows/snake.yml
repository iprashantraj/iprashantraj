name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: iprashantraj
          outputs: |
            dist/snake.svg?color_snake=%238ec07c&color_dots=%233c3836,%23665c54,%23d79921,%23fe8019,%23fabd2f
            dist/snake-dark.svg?palette=github-dark&color_snake=%238ec07c&color_dots=%233c3836,%23665c54,%23d79921,%23fe8019,%23fabd2f

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
